<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Vàng 365 - Vietnamese Gold Price API</title>
    <meta name="description" content="API tra cứu giá vàng Việt Nam (DOJI, SJC) cập nhật liên tục 24/7.">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --primary: #fbbf24;
            --primary-dark: #d97706;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: #000;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
            margin: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-outline:hover {
            background-color: var(--primary);
            color: #000;
        }

        footer {
            margin-top: 3rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gia Vàng 365</h1>
        <p>Hệ thống cung cấp API giá vàng Việt Nam thời gian thực, chính xác và tin cậy.</p>
        
        <div class="card">
            <a href="/docs" class="btn">Xem tài liệu API</a>
            <a href="/v1/gold-prices" class="btn btn-outline">Thử nghiệm API</a>
        </div>

        <footer>
            &copy; 2026 Toan Nhu. Powered by Node.js & Express.
        </footer>
    </div>

    <script>
        // WebMCP implementation
        if (navigator.modelContext && navigator.modelContext.provideContext) {
            navigator.modelContext.provideContext({
                tools: [
                    {
                        name: "get_gold_prices",
                        description: "Get current Vietnamese gold prices (DOJI, SJC)",
                        inputSchema: {
                            type: "object",
                            properties: {}
                        },
                        execute: async () => {
                            const response = await fetch('/v1/gold-prices');
                            return await response.json();
                        }
                    },
                    {
                        name: "get_historical_gold_prices",
                        description: "Get historical gold prices for a specific timerange (day, week, month)",
                        inputSchema: {
                            type: "object",
                            properties: {
                                timerange: {
                                    type: "string",
                                    enum: ["day", "week", "month"],
                                    default: "week"
                                }
                            },
                            required: ["timerange"]
                        },
                        execute: async ({ timerange }) => {
                            const response = await fetch(`/v1/gold-prices/historical?timerange=${timerange}`);
                            return await response.json();
                        }
                    }
                ]
            });
            console.log("WebMCP tools registered");
        }
    </script>
</body>
</html>
